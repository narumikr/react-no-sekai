name: CI Lint Check

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
      - develop/**

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node

      - name: Lint
        run: pnpm lint
